# firmware (Lua V2) - self-contained build/flash/repl/test for the
# eLua-successor (Lua 5.4) port to the Nabaztag:tag V2 (OKI ML67Q4051, ARM7TDMI).
# The `lua` layer `includes:` this under the `firmware` namespace, so targets are
# (from the repo root; `lua:` prefix drops when run inside the layer):
#   task lua:firmware:build               -> bin/firmware.{elf,hex,bin}  (the Lua product)
#   task lua:firmware:build EXAMPLE=blink -> bin/blink.{elf,hex,bin}     (a bring-up prog)
#   task lua:firmware:simulate            -> run a firmware image in the Unicorn sim (#96)
#   task lua:firmware:simulate:repl       -> run the product in the sim + drive its REPL (#92)
#   task lua:firmware:flash               -> flash the product over JTAG via the Pi (#90)
#   task lua:firmware:flash:repl          -> flash + drive the Lua REPL over UART on HW (#207)
#   task lua:firmware:test                -> #128 bytecode round-trip golden (in the sim)
# This leaf owns BUILD + simulate/flash of firmware images + driving the REPL
# (interactively over sim or HW). Running a Lua *app* in the sim is
# `task lua:apps:simulate`; compiling a .lua is `task lua:apps:compile APP=…`.
#
# Two kinds of build target (see Makefile): the product firmware (src/main.c, the
# Lua host - the default, bakes lua/boot/boot.lua) and standalone examples
# (examples/<name>.c, own main(), no Lua) picked with EXAMPLE=<name>.
#
# Relocatable: every target works both from the repo root (`task
# lua:firmware:build`) and from inside the folder (`cd lua/firmware && task
# build`). Two rules make that work around Task quirks:
#   * `dir:` is ALWAYS `{{.TASKFILE_DIR}}` (this leaf's own dir, lua/firmware).
#     Task doubles an absolute `dir` that comes from any other var.
#   * REPO (the lua layer root, via sh) is used only as a *path value* — a prefix
#     on layer-level files (tools/openocd, tools/luac, apps/, user SCRIPT paths)
#     and as WORKDIR handed to the nested luac/simulator tools (their Docker build
#     context). Bin/ELFs live here (bin/…), so they stay bare.
# FV_IMAGE / SIM_IMAGE are the leaf's own defaults (NOT passed from root): Task
# bleeds a child include's vars up into the parent's task scope, so a generic
# IMAGE would be clobbered by the nested luac/simulator includes. Unique names
# sidestep that. The shared simulator image is built by the tool include but run
# from here (test) / the simulate leaf.
version: '3'

vars:
  FV_IMAGE: '{{.FV_IMAGE | default "nabaztag-sdk-lua-firmware"}}'
  SIM_IMAGE: '{{.SIM_IMAGE | default "nabaztag-sdk-simulator"}}'
  # REPO = the lua layer root, resolved depth-independently (walk up to just below
  # .git). MUST be identical in every leaf (across BOTH layers): Task keeps one
  # entry per leaf-global var name, so a fixed-depth formula from a sibling leaf
  # at another depth can be applied here with the wrong root (random Go map
  # order). A depth-independent formula is collision-proof - any cross-applied
  # copy still resolves the correct layer root.
  REPO:
    sh: d='{{.TASKFILE_DIR}}'; while [ "$(dirname "$d")" != / ] && [ ! -e "$(dirname "$d")/.git" ]; do d="$(dirname "$d")"; done; echo "$d"

includes:
  luac: # host Lua->bytecode compiler (built with the lua layer root as Docker context)
    taskfile: ../tools/luac/Taskfile.yaml
    internal: true   # image + REPL framing; the user-facing compile verb is lua:apps:compile (root)
  simulator: # Unicorn simulator (built with the lua layer root as Docker context)
    taskfile: ../tools/simulator/Taskfile.yaml
    internal: true
  boot: # the resident boot chunk; build delegates its embed here (lua:boot:compile)
    taskfile: ../boot/Taskfile.yaml
    internal: true

tasks:
  image:
    internal: true   # built on demand as a dep; rebuilt when the toolchain changes
    dir: '{{.TASKFILE_DIR}}'
    # Skip the build unless needed: Task skips only when ALL checks pass, so the
    # image must exist (status) AND the Dockerfile be unchanged (sources
    # checksum). The toolchain lives entirely in the Dockerfile - no COPY, the
    # src tree is bind-mounted at run - so it's the only source. Deleting the
    # image or editing the Dockerfile re-triggers.
    sources:
      - Dockerfile
    status:
      - docker image inspect {{.FV_IMAGE}} >/dev/null 2>&1
    cmds:
      - docker build -t {{.FV_IMAGE}} .

  build:
    desc: 'Build the firmware. Default: the product Lua image -> bin/firmware.{elf,hex,bin}. EXAMPLE=<name> builds a standalone bring-up prog examples/<name>.c -> bin/<name>.{elf,hex,bin}. Usage: task lua:firmware:build [EXAMPLE=blink] [DEBUG=1]'
    # DEBUG=1 (M11, #119) turns on the vendored usb/net stacks' UART trace macros;
    # the artifact becomes bin/<name>-dbg.elf (separate obj tree).
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - task: image
      # Bytecode-only product image (#128): the resident boot chunk has no
      # on-device parser, so it ships precompiled. Delegate that embed to the boot
      # leaf -> gen/boot_lc.h (main.c #includes it). Runs for every build; example
      # images don't -Igen (Makefile) so they just ignore the generated header.
      - mkdir -p gen
      - task: boot:compile
        vars: {OUT: '{{.TASKFILE_DIR}}/gen/boot_lc.h'}
      - 'docker run --rm -e SSID -e PSK -e BSSID -e CHANNEL -v "$(realpath .):/work" {{.FV_IMAGE}} make{{if .EXAMPLE}} EXAMPLE={{.EXAMPLE}}{{end}}{{if eq .DEBUG "wifi"}} DEBUG_WIFI=1{{else}}{{if .DEBUG}} DEBUG_USB=1 DEBUG_WIFI=1{{end}}{{end}}'

  simulate:
    desc: 'Run a firmware image in the Unicorn simulator, no hardware (#96). Default: the product image; EXAMPLE=<name> runs a bring-up example headless. (To run a Lua app in the sim, use lua:apps:simulate.) Usage: task lua:firmware:simulate [EXAMPLE=blink] [ARGS=-v]'
    dir: '{{.TASKFILE_DIR}}'
    deps:
      - task: simulator:image       # shared Unicorn sim image = nabaztag-sdk-simulator
        vars: {WORKDIR: '{{.REPO}}'}
    cmds:
      - task: build
        vars: {EXAMPLE: '{{.EXAMPLE}}'}
      # delegate the run to the simulator leaf (it owns the sim invocation)
      - task: simulator:run
        vars:
          BIN: '{{.REPO}}/firmware/bin'
          ELF: '{{.EXAMPLE | default "firmware"}}.elf'
          ARGS: '{{.ARGS}}'

  simulate:repl:
    desc: 'Run the product firmware in the simulator and drive its Lua REPL interactively, no hardware (#92): luash.py compiles each typed line off-device to bytecode and pipes #LC frames to the sim''s --interactive console. Ctrl-D ends it. (The on-hardware REPL is lua:firmware:flash:repl; to feed a scripted app use lua:apps:simulate.) Usage: task lua:firmware:simulate:repl'
    dir: '{{.TASKFILE_DIR}}'
    interactive: true   # luash.py owns your terminal
    deps:
      - task: luac:image          # host luac: compiles each typed line
        vars: {WORKDIR: '{{.REPO}}'}
      - task: simulator:image
        vars: {WORKDIR: '{{.REPO}}'}
    cmds:
      - task: build
      # luash.py owns the terminal, compiles each typed line off-device to bytecode,
      # and pipes #LC frames to the sim's --interactive console - a live REPL with
      # no on-device parser (#128). Inline: luash wraps the docker argv directly.
      - python3 '{{.REPO}}/tools/luac/luash.py' -- docker run --rm -i -v "$(realpath bin):/mnt:ro" {{.SIM_IMAGE}} --interactive /mnt/firmware.elf

  flash:
    desc: 'Flash the firmware to real hardware over JTAG, via a Raspberry Pi bridge. Default: the product image; EXAMPLE=<name> flashes that bring-up prog. CAPTURE=1 then streams the flashed program''s UART transcript read-only (no stdin) until the <<FV_DONE>> marker or RUN_TIMEOUT - for print-only examples like wifiprobe/usbprobe.'
    summary: 'Usage: task lua:firmware:flash [EXAMPLE=wifiprobe] [CAPTURE=1] [RUN_TIMEOUT=120] [PI_HOST=tobi@jtag.local]. See lua/tools/openocd/README.md.'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      PI_HOST: '{{.PI_HOST | default "tobi@jtag.local"}}'
      # product -> bin/firmware.elf; EXAMPLE=<name> -> bin/<name>.elf
      TARGET: '{{.EXAMPLE | default "firmware"}}'
      RUN_TIMEOUT: '{{.RUN_TIMEOUT | default "120"}}'
    cmds:
      - task: build
        vars: {EXAMPLE: '{{.EXAMPLE}}'}
      - |
        set -e
        if [ -n "{{.CAPTURE}}" ]; then
          # Print-only bring-up example: flash over JTAG, then stream its UART
          # transcript read-only (no stdin fed - it has no REPL to drive) until
          # the <<FV_DONE>> marker or RUN_TIMEOUT. Same flash.py --uart path the
          # scripted REPL uses, minus --input.
          python3 '{{.REPO}}/tools/openocd/flash.py' --uart --host {{.PI_HOST}} \
            --configs '{{.REPO}}/tools/openocd' --elf bin/{{.TARGET}}.elf \
            --run-timeout {{.RUN_TIMEOUT}}
        else
          python3 '{{.REPO}}/tools/openocd/flash.py' --host {{.PI_HOST}} \
            --configs '{{.REPO}}/tools/openocd' --elf bin/{{.TARGET}}.elf
        fi

  flash:repl:
    desc: 'Flash the product firmware and drive its Lua REPL over the UART bridge on real hardware (#207): JTAG flash, then read/write /dev/serial0 on the Pi (no OpenOCD session, no CPU halts). SCRIPT=file.lua|.lc feeds a scripted run and captures it; omit for a live interactive prompt (luash.py). All input is compiled off-device to luac bytecode (#128).'
    summary: 'Usage: task lua:firmware:flash:repl [SCRIPT=path.lua] [RUN_TIMEOUT=120] [PI_HOST=tobi@jtag.local]. See lua/tools/openocd/README.md.'
    dir: '{{.TASKFILE_DIR}}'
    interactive: true   # the live-prompt branch hands your terminal to luash.py
    vars:
      PI_HOST: '{{.PI_HOST | default "tobi@jtag.local"}}'
      RUN_TIMEOUT: '{{.RUN_TIMEOUT | default "120"}}'
    deps:
      - task: luac:image   # host luac: compiles the script (or every live line) to bytecode
        vars: {WORKDIR: '{{.REPO}}'}
    cmds:
      - task: build
      - |
        set -e
        if [ -n "{{.SCRIPT}}" ]; then
          # Scripted run: compile off-device to a framed bytecode file, then
          # flash + feed it over UART (paced for flow control) and read the
          # transcript. replpipe.py auto-detects .lua (per-line) vs .lc.
          INPUT="$(mktemp)"
          python3 '{{.REPO}}/tools/luac/replpipe.py' "{{.REPO}}/{{.SCRIPT}}" -o "$INPUT"
          python3 '{{.REPO}}/tools/openocd/flash.py' --uart --host {{.PI_HOST}} \
            --configs '{{.REPO}}/tools/openocd' --elf bin/firmware.elf \
            --input "$INPUT" --run-timeout {{.RUN_TIMEOUT}}
        else
          # Live REPL: flash over JTAG, then luash.py owns your terminal and
          # drives uart_repl.py --relay on the Pi (it paces bytes to /dev/serial0),
          # compiling each line you type off-device to bytecode. Ctrl-D ends it.
          python3 '{{.REPO}}/tools/openocd/flash.py' --host {{.PI_HOST}} \
            --configs '{{.REPO}}/tools/openocd' --elf bin/firmware.elf
          python3 '{{.REPO}}/tools/luac/luash.py' -- \
            ssh {{.PI_HOST}} 'cd openocd && sudo python3 uart_repl.py --relay'
        fi

  test:
    desc: 'Firmware tests. Today: the #128 bytecode-pipeline golden - compile a Lua app off-device (luac -> #LC frames) and run it on the parser-less sim; the console transcript must match the committed golden (exercises luac -> frame -> lundump -> run -> print end to end). REGEN=1 rewrites the golden.'
    summary: 'Usage: task lua:firmware:test [APP=test/luac-roundtrip.lua] [EXPECT=test/luac-roundtrip.expected] [REGEN=1]'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      # firmware-owned fixtures (test/), APP/EXPECT are relative to this leaf
      APP: '{{.APP | default "test/luac-roundtrip.lua"}}'
      EXPECT: '{{.EXPECT | default "test/luac-roundtrip.expected"}}'
    deps:
      - task: build                 # the product firmware -> bin/firmware.elf
      - task: simulator:image       # shared Unicorn sim image = nabaztag-sdk-simulator
        vars: {WORKDIR: '{{.REPO}}'}
      - task: luac:image            # host luac, used by replpipe.py below
        vars: {WORKDIR: '{{.REPO}}'}
    cmds:
      - |
        set -e
        SIM={{.SIM_IMAGE}}
        BIN="$(realpath bin)"
        EXP="{{.TASKFILE_DIR}}/{{.EXPECT}}"
        # The framed file is bind-mounted into the sim, so it must live under a
        # Docker-shared host path. colima shares only the home tree (/Users), not
        # /tmp or /var/folders, so a bare mktemp would mount as an empty dir. Put
        # it under the repo (REPO is under /Users) and clean it up.
        FR="$(mktemp "{{.REPO}}/.luacframe.XXXXXX")"; trap 'rm -f "$FR"' EXIT
        python3 '{{.REPO}}/tools/luac/replpipe.py' "{{.TASKFILE_DIR}}/{{.APP}}" -o "$FR"
        # Run the frames on the parser-less sim; --console-only keeps stdout a
        # pure transcript (emulator stats go to stderr). Invoked inline (not via
        # simulator:run) because we must capture stdout into $GOT to diff the golden.
        GOT="$(docker run --rm -v "$BIN:/mnt:ro" -v "$FR:/in:ro" "$SIM" \
                 --console-only -n 120000000 --input-file /in /mnt/firmware.elf)"
        # Guard a false pass: an init/boot hang yields an empty transcript that
        # would match an empty golden. Require the fixture's first print.
        case "$GOT" in
          *"luac round-trip"*) : ;;
          *) echo "test: no REPL output - the sim never reached the prompt ✗"
             printf '%s\n' "$GOT"; exit 1 ;;
        esac
        if [ -n "{{.REGEN}}" ]; then
          printf '%s\n' "$GOT" > "$EXP"
          echo "test: regenerated golden $EXP ✓"
          exit 0
        fi
        if [ "$GOT" = "$(cat "$EXP")" ]; then
          echo "test: bytecode transcript matches the golden ✓"
        else
          echo "test MISMATCH (golden $EXP vs bytecode run):"
          diff <(cat "$EXP") <(printf '%s\n' "$GOT") || true
          echo "If the change is intended: task lua:firmware:test REGEN=1"
          exit 1
        fi

  test:inject:
    desc: 'Peripheral-injection golden (#42): feed a Lua probe that reads the button/RFID/ear bindings while a JSON-Lines timeline injects those inputs; the console transcript must match the committed golden. Exercises the simulator input model (button/RFID/ear) end to end. REGEN=1 rewrites the golden.'
    summary: 'Usage: task lua:firmware:test:inject [APP=test/inject-sensors.lua] [INJECT=test/inject-sensors.jsonl] [EXPECT=test/inject-sensors.expected] [REGEN=1]'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      APP: '{{.APP | default "test/inject-sensors.lua"}}'
      INJECT: '{{.INJECT | default "test/inject-sensors.jsonl"}}'
      EXPECT: '{{.EXPECT | default "test/inject-sensors.expected"}}'
    deps:
      - task: build                 # the product firmware -> bin/firmware.elf
      - task: simulator:image
        vars: {WORKDIR: '{{.REPO}}'}
      - task: luac:image
        vars: {WORKDIR: '{{.REPO}}'}
    cmds:
      - |
        set -e
        SIM={{.SIM_IMAGE}}
        BIN="$(realpath bin)"
        EXP="{{.TASKFILE_DIR}}/{{.EXPECT}}"
        INJ="{{.TASKFILE_DIR}}/{{.INJECT}}"
        # Frame the probe to #LC bytecode (parser-less #128) under REPO so a
        # /Users-only Docker share can bind-mount it; feed it + the injection
        # timeline to the sim and capture the pure console transcript.
        FR="$(mktemp "{{.REPO}}/.luacframe.XXXXXX")"; trap 'rm -f "$FR"' EXIT
        python3 '{{.REPO}}/tools/luac/replpipe.py' "{{.TASKFILE_DIR}}/{{.APP}}" -o "$FR"
        GOT="$(docker run --rm -v "$BIN:/mnt:ro" -v "$FR:/in:ro" -v "$INJ:/inject.jsonl:ro" "$SIM" \
                 --console-only -n 120000000 --input-file /in --inject-file /inject.jsonl /mnt/firmware.elf)"
        # Guard a false pass: an init/boot hang yields an empty transcript that
        # would match an empty golden. Require the probe's first print.
        case "$GOT" in
          *"inject-sensors start"*) : ;;
          *) echo "test:inject: no probe output - the sim never reached the prompt ✗"
             printf '%s\n' "$GOT"; exit 1 ;;
        esac
        if [ -n "{{.REGEN}}" ]; then
          printf '%s\n' "$GOT" > "$EXP"
          echo "test:inject: regenerated golden $EXP ✓"
          exit 0
        fi
        if [ "$GOT" = "$(cat "$EXP")" ]; then
          echo "test:inject: injection transcript matches the golden ✓"
        else
          echo "test:inject MISMATCH (golden $EXP vs run):"
          diff <(cat "$EXP") <(printf '%s\n' "$GOT") || true
          echo "If the change is intended: task lua:firmware:test:inject REGEN=1"
          exit 1
        fi

  clean:
    desc: 'Remove firmware (V2) build artifacts (bin/, obj/, gen/) and the Docker images (incl. host luac + simulator)'
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - rm -rf bin obj gen
      - docker rmi {{.FV_IMAGE}} {{.SIM_IMAGE}} || true
      - task: luac:clean
