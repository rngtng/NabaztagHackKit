# lua/net - the Lua network bootstrap (#217): ARP/IPv4/UDP/DHCP/TCP/HTTP as
# pure-Lua modules over the raw-frame nab.wifi_* bindings (#216).
#
# Nothing here is baked into the flash image: modules are loaded as #LC
# bytecode frames over the REPL (task lua:firmware:repl:hw) during development,
# and #219 decides what gets frozen into the resident boot chunk. Tests run
# host-side under the tools/luac image's `lua` - built from the same vendored
# tree + LUA_32BITS luaconf.h as the device, so integer width and string.pack
# semantics match the rabbit exactly.
version: '3'

vars:
  LUAC_IMAGE: nabaztag-sdk-luac
  # Layer root, walk-up formula identical to the sibling leaves (see
  # firmware/Taskfile.yaml for why it must be depth-independent).
  REPO:
    sh: d='{{.TASKFILE_DIR}}'; while [ "$(dirname "$d")" != / ] && [ ! -e "$(dirname "$d")/.git" ]; do d="$(dirname "$d")"; done; echo "$d"

includes:
  luac: # host luac/lua image (built with the lua layer root as Docker context)
    taskfile: ../tools/luac/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-luac, DIR: tools/luac}

tasks:
  test:
    desc: 'Host-side unit tests for the net modules: fixture packets (independently generated) through build/parse/state machines, plus a lint that no module leaves the device stdlib (base+table+string).'
    dir: '{{.TASKFILE_DIR}}'
    deps:
      - task: luac:image
        vars: {WORKDIR: '{{.REPO}}'}
    cmds:
      - 'docker run --rm -v "$(realpath .):/net:ro" --entrypoint lua {{.LUAC_IMAGE}} /net/test/run.lua'

  size:
    desc: 'Stripped device-bytecode size of every net module (+ total) - the measured number #219 budgets against.'
    dir: '{{.TASKFILE_DIR}}'
    deps:
      - task: luac:image
        vars: {WORKDIR: '{{.REPO}}'}
    cmds:
      - |
        total=0
        for m in link arp ipv4 udp dhcp tcp http iface; do
          [ -f "$m.lua" ] || continue
          n=$(docker run --rm -i {{.LUAC_IMAGE}} -s -o /dev/stdout - < "$m.lua" | wc -c)
          total=$((total+n))
          printf '%8s %6d B\n' "$m" "$n"
        done
        printf '%8s %6d B  (stripped .lc, full bootstrap set)\n' TOTAL "$total"
