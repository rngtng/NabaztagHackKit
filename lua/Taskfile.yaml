# NabaztagSDK — Lua (V2) track entrypoint.
#
# Every build runs inside Docker, so the only host requirements are Docker and
# Task (https://taskfile.dev). This file only `includes:` the self-contained
# `firmware/` leaf, so targets read as `<leaf>:<verb>` — e.g.
# `task firmware:build APP=lua`, `task firmware:flash`, `task firmware:repl:hw`
# (from the repo root: `task lua:firmware:…`). Every leaf is relocatable:
# `task firmware:build` here == `cd firmware && task build` there. Run `task`
# with no args to list everything.
#
# This file owns no toolchain includes and re-implements nothing: `verify`/
# `clean` just chain the leaf's own verbs. Decentralised per #63 — remaining
# per-leaf duplication is intentional for now (DRY: #187).
version: '3'

vars:
  OUT: build

includes:
  firmware: # Lua-successor firmware (Lua 5.4)
    taskfile: ./firmware/Taskfile.yaml
  net: # pure-Lua network bootstrap (#217): ARP/IPv4/UDP/DHCP/TCP/HTTP modules
    taskfile: ./net/Taskfile.yaml

tasks:
  verify:
    desc: 'Definition of done for the Lua (V2) layer: the net-module unit tests pass, the firmware image builds (fails loudly on flash overflow) and the bytecode pipeline round-trips (test:luac golden transcript).'
    cmds:
      - task: net:test
      - task: firmware:build
      - task: firmware:test:luac

  clean:
    desc: 'Clean all build artifacts and the layers'' Docker images.'
    cmds:
      - task: firmware:clean
      - rm -rf '{{.OUT}}'
