version: '3'

vars:
  IMAGE: '{{.IMAGE | default "testvm"}}'
  DIR: '{{.DIR | default "."}}'

tasks:
  image:
    internal: true   # sources are mounted at runtime, not baked in; Dockerfile only needs the toolchain
    dir: '{{.DIR}}'
    cmds:
      - docker build -t {{.IMAGE}} .

  simulate:
    desc: 'Build and run testvm against boot bytecode. Requires build:boot first. Usage: task testvm:simulate [SOURCE=build/boot/dumpbc.c] [SOCK_DIR=build]'
    deps: [image]
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "build/boot/dumpbc.c"}}'
      SOCK_DIR: '{{.SOCK_DIR | default "."}}'
    cmds:
      - cp '{{.SOURCE}}' tools/testvm/bc.c
      - mkdir -p {{.SOCK_DIR}}
      - defer: rm -f tools/testvm/bc.c
      # firmware's vm/net sources mount at /work; testvm's own sources overlay at /work/testvm
      - 'docker run --rm --init
          -v "$(realpath src/firmware):/work"
          -v "$(realpath tools/testvm):/work/testvm"
          -v "$(realpath {{.SOCK_DIR}}):/sock"
          -w /work/testvm
          {{.IMAGE}}
          sh -c "make && ./testvm"'

  test:
    desc: 'Build testvm and smoke-test it against boot bytecode for a bounded run. Requires build:boot first. Usage: task testvm:test [SOURCE=build/boot/dumpbc.c] [SOCK_DIR=build] [DURATION=5]'
    deps: [image]
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "build/boot/dumpbc.c"}}'
      SOCK_DIR: '{{.SOCK_DIR | default "."}}'
      DURATION: '{{.DURATION | default 5}}'
    cmds:
      - cp '{{.SOURCE}}' tools/testvm/bc.c
      - mkdir -p {{.SOCK_DIR}}
      - defer: rm -f tools/testvm/bc.c
      # a clean exit (0) or a timeout while still running (124) both mean the VM
      # survived DURATION seconds without crashing (segfault -> 139); that's a pass
      - 'docker run --rm --init
          -v "$(realpath src/firmware):/work"
          -v "$(realpath tools/testvm):/work/testvm"
          -v "$(realpath {{.SOCK_DIR}}):/sock"
          -w /work/testvm
          {{.IMAGE}}
          sh -c "make && (timeout {{.DURATION}} ./testvm; ec=\$?; [ \$ec -eq 0 ] || [ \$ec -eq 124 ]) "'

  bugs:
    desc: 'Regression guard: build & run the firmware VM memory-safety scenarios (#66 findings #69/#70) under AddressSanitizer. All must stay clean; exits nonzero if a fixed OOB bug is reintroduced.'
    deps: [image]
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      # same mount layout as simulate/test: firmware at /work, this layer at /work/testvm
      - 'docker run --rm --init
          -v "$(realpath src/firmware):/work"
          -v "$(realpath tools/testvm):/work/testvm"
          -w /work/testvm
          {{.IMAGE}}
          sh ./run-bugrepro.sh'

  clean:
    desc: 'Remove testvm build artifacts and Docker image'
    cmds:
      - docker rmi {{.IMAGE}} || true
      - rm -f tools/testvm/testvm tools/testvm/bc.c tools/testvm/bugrepro
      - rm -Rf tools/testvm/obj
