version: '3'

vars:
  IMAGE: '{{.IMAGE | default "mtl_linux"}}'
  DIR: '{{.DIR | default "."}}'

tasks:
  image:
    internal: true   # built on demand as a dep; rebuilt when the toolchain/config changes
    dir: '{{.DIR}}'
    cmds:
      - docker build -t {{.IMAGE}} .

  compile:
    desc: 'Compile MTL source → bytecode.  Usage: task mtl:compile SOURCE=<src.mtl> [OUT=<dir>] [SIGN=false].  Writes <name>.bin and a dumpbc.c debug dump into OUT (defaults to cwd).'
    deps: [image]
    dir: '{{.USER_WORKING_DIR}}'   # resolve SOURCE/OUT relative to the dir the user ran `task` from, not the Taskfile's
    requires:
      vars: [SOURCE]
    vars:
      OUT: '{{.OUT | default "."}}'   # output directory; defaults to cwd
      OUTFILE: '{{printf "%s.bin" (trimSuffix ".mtl" (base .SOURCE))}}'
      SIGN: '{{.SIGN | default "true"}}'   # signed device-flash format by default; SIGN=false for raw bytecode
    cmds:
      # mount SOURCE's dir read-only at /in; mount OUT dir at /out for the result; tools live at /src
      # -w /out: compiler always writes a dumpbc.c into its cwd, so cwd = OUT to capture it (else it's lost on --rm)
      # compiler args are positional: [-s] source output
      # the compiler always exits 0 (even on fatal errors, reported on stderr — hence
      # 2>&1), so scan its output the same way mtl:test does
      - mkdir -p {{.OUT}}
      - 'docker run --rm -v "$(dirname $(realpath {{.SOURCE}})):/in:ro" -v "$(realpath {{.OUT}}):/out" -w /out {{.IMAGE}} /src/mtl_compiler {{if eq .SIGN "true"}}-s {{end}}/in/{{base .SOURCE}} /out/{{.OUTFILE}} 2>&1 | tee /dev/stderr | (! grep -qE "Syntax error|Typechecking error|is EMPTY|\?OM Error") > /dev/null'

  simulate:
    desc: 'Run an MTL app in the simulator (config baked in).  Usage: task mtl:simulate SOURCE=<app>.mtl [PORT=<host-port>] [-- extra args]'
    deps: [image]
    dir: '{{.USER_WORKING_DIR}}'   # resolve SOURCE relative to the dir the user ran `task` from, not the Taskfile's
    requires:
      vars: [SOURCE]
    vars:
      PORT: '{{.PORT | default 8080}}'
      NETWORK: '{{.NETWORK | default ""}}'   # optional user-defined docker network to join (lets the sim reach the mock file server)
    cmds:
      # cwd = /src so the baked config.txt is found; SOURCE is mounted into /work and passed via --source.
      # --init: run tini as PID 1 so the sim (no SIGINT handler) is a child and a single Ctrl+C stops it.
      # PORT: maps container port 80 (HTTP config server) to the given host port.
      # NETWORK: when set, join a shared docker network so outbound requests can reach a sibling mock server.
      - 'docker run --rm --init {{if .NETWORK}}--network {{.NETWORK}} {{end}}-p {{.PORT}}:80 -v "$(dirname $(realpath {{.SOURCE}})):/work" {{.IMAGE}} /src/mtl_simu --source /work/{{base .SOURCE}} {{.CLI_ARGS}}'

  test:
    desc: 'Run an MTL test program in the simulator; fails on "!!" assertion failures or compile errors.  Usage: task mtl:test SOURCE=<test>.mtl'
    deps: [image]
    dir: '{{.USER_WORKING_DIR}}'
    requires:
      vars: [SOURCE]
    cmds:
      # the simulator always exits 0, so scan its output: assertion failures
      # are marked "!!", compile problems print Syntax/Typechecking/OM errors
      # (2>&1: the compiler reports errors on stderr, which would bypass the pipe)
      - 'docker run --rm --init -v "$(dirname $(realpath {{.SOURCE}})):/work" {{.IMAGE}} /src/mtl_simu --source /work/{{base .SOURCE}} 2>&1 | tee /dev/stderr | (! grep -qE "!!|Syntax error|Typechecking error|\?OM Error") > /dev/null'

  clean:
    desc: 'Remove Docker image and build artifacts'
    cmds:
      - docker rmi {{.IMAGE}} || true
