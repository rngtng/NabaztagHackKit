# Raspberry Pi (Model A+, BCM2835) as a bit-banged JTAG adapter for the
# Nabaztag:tag (V2) — OKI ML67Q4051. No Bus Pirate / Bus Blaster needed.
#
# REQUIRES OpenOCD 0.8.0 built from RedoX's OKI patch: mainline OpenOCD has no
# `ml67q40xx` flash driver, so the apt package fails with
# "flash driver 'ml67q40xx' not found". See DEBRICK.md to build it on the Pi.
#
# Syntax below is OpenOCD 0.8.0 (old "interface ..." form), NOT the 0.11+
# "adapter driver ..." form. Run ON THE PI from this openocd/ dir:
#     sudo /usr/local/bin/openocd -f nabaztag-pi.cfg

interface bcm2835gpio
# 0.8.0 hardcodes the BCM2835 peripheral base to 0x20000000 — correct for the
# Pi A+ / 1 / Zero, so there is no peripheral_base command to set.
bcm2835gpio_speed_coeffs 113714 28        ;# canonical Pi 1 bit-bang timing

# BCM GPIO numbers ->     TCK  TMS  TDI  TDO
bcm2835gpio_jtag_nums      11   25   10    9
bcm2835gpio_srst_num       24             ;# Nabaztag RESETN (pin 8)

source [find target/ml67q4051.cfg]

# The Nabaztag JTAG header exposes only RESETN (no TRST), so override the
# target file's trst_and_srst default.
reset_config srst_only srst_push_pull
