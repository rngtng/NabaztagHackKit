name: CI

# Gate merges: run the MTL test suite and the full `task verify`
# (definition of done) on every PR so failing code can't be merged.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: test + verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Host needs only Docker + Task; both are provided by the runner /
      # this idempotent bootstrap. The proxy-CA shim inside the script
      # no-ops here (no /root/.ccr/ca-bundle.crt) and Docker is already up,
      # so it effectively just installs `task`.
      - name: Bootstrap toolchain (Docker + Task)
        run: ./scripts/claude-setup.sh

      # Fast signal first: the MTL unit tests. `task test` self-checks its
      # own output and exits nonzero on Syntax/Typechecking/EMPTY/OM errors.
      - name: Run tests
        run: task test

      # Definition of done: test + boot + app-piper + app-template + app-sse
      # must all build. Re-runs test (cheap) so this job is the merge gate.
      - name: Run verify
        run: task verify
