name: CI

# Gate merges: run the MTL test suite and the full `task verify`
# (definition of done) on every PR so failing code can't be merged.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: test + verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap toolchain (Docker + Task)
        run: ./scripts/claude-setup.sh

      - name: Run verify Firmware + mtl V1
        run: task verify

      - name: Run verify Firmware + mtl V2
        run: task verifyV2
