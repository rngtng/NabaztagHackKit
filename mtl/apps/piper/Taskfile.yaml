# app-piper — self-contained build/simulate for the piper MTL app (#63).
#
# Root only `includes:` this under the `app-piper` namespace → `app-piper:build`
# / `app-piper:simulate` / `app-piper:simulate:mock`. Relocatable (repo root AND
# `cd src/app-piper && task build`); REPO = repo root, passed as WORKDIR so the
# shared preprocessor/mtl tools mount it (the app needs lib/, outside this
# folder). Preprocess→compile plumbing is duplicated across app leaves for now
# (#63); shared helper is the DRY follow-up (#187).
version: '3'

# Source/output paths are hardcoded per task (not leaf-global vars): a leaf-global
# bleeds across the sibling apps:* includes (piper would read app-sse's paths), the
# same hazard boot/bootV2 call out. piper builds apps/piper/main.mtl → build/app-piper.
vars:
  OUT: '{{.OUT | default "build"}}'
  # REPO = this leaf's layer root (the child of the repo root). Resolved by
  # walking up to just below the .git dir, NOT by a fixed `../..` depth: Task
  # keeps one entry per leaf-global var name, so a fixed-depth `REPO` formula from
  # a sibling leaf at a different depth can be applied here (Go map order is
  # random) and silently pick the wrong dir. A depth-independent formula is
  # identical in every leaf, so any cross-applied copy still resolves correctly.
  REPO:
    sh: d='{{.TASKFILE_DIR}}'; while [ "$(dirname "$d")" != / ] && [ ! -e "$(dirname "$d")/.git" ]; do d="$(dirname "$d")"; done; echo "$d"

includes:
  preprocessor:
    taskfile: ../../tools/preprocessor/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-preprocessor, DIR: ../../tools/preprocessor}
  mtl:
    taskfile: ../../tools/mtl_linux/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-mtl, DIR: ../../tools/mtl_linux}
  mockserver:
    taskfile: ../../tools/mockserver/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-mockserver, DIR: ../../tools/mockserver}

tasks:
  build:
    desc: 'Build app-piper → build/app-piper.'
    summary: 'Usage: task app-piper:build [OUT=build]'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/app-piper'
    cmds:
      - task: preprocessor:preprocess
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: 'apps/piper/main.mtl'
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'apps/piper lib/'
      - task: mtl:compile
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          OUT: '{{.APP_OUT}}'

  simulate:
    desc: 'Simulate app-piper in the MTL simulator. HTTP UI at http://localhost:8080.'
    summary: 'Usage: task app-piper:simulate [OUT=build] [PORT=8080]'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/app-piper'
    cmds:
      - task: preprocessor:preprocess
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: 'apps/piper/main.mtl'
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'apps/piper lib/'
          DEFINES: SIMU
      - task: mtl:simulate
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          PORT: '{{.PORT}}'
          CLI_ARGS: '{{.CLI_ARGS}}'

  simulate:mock:
    desc: 'Simulate app-piper end-to-end with the mock file server (serves apps/piper/assets, e.g. init.forth).'
    summary: 'Usage: task app-piper:simulate:mock'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/app-piper'
      NET: nabaztag-mocknet
      MOCK_IP: 172.30.0.10
      ASSETS: assets   # leaf-relative: cwd is this app's own dir
    cmds:
      - task: mockserver:image
      # shared network + mock container the sim can reach at a fixed IP (literal IP => sim skips DNS)
      - docker network create --subnet 172.30.0.0/24 {{.NET}} >/dev/null 2>&1 || true
      - defer: docker network rm {{.NET}} >/dev/null 2>&1 || true
      - docker rm -f nabaztag-mock >/dev/null 2>&1 || true
      - 'docker run -d --rm --name nabaztag-mock --network {{.NET}} --ip {{.MOCK_IP}} -v "$(realpath {{.ASSETS}}):/assets:ro" nabaztag-sdk-mockserver >/dev/null'
      - defer: docker stop nabaztag-mock >/dev/null 2>&1 || true
      # stream the mock's request log alongside the sim output (-u: unbuffered, so lines appear live)
      - docker logs -f nabaztag-mock 2>&1 | sed -u 's/^/[mock] /' &
      - task: preprocessor:preprocess
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: 'apps/piper/main.mtl'
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'apps/piper lib/'
          DEFINES: SIMU
      - task: mtl:simulate
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          NETWORK: '{{.NET}}'
          CLI_ARGS: '--serverurl {{.MOCK_IP}} {{.CLI_ARGS}}'
