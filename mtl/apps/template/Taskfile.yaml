# app-template — self-contained build/simulate for this MTL app (#63).
#
# Root only `includes:` this under the `app-template` namespace, so targets are
# `app-template:build` / `app-template:simulate`. Relocatable: works from the
# repo root AND from `cd src/app-template && task build`. REPO = repo root
# (TASKFILE_DIR is 2 levels down); the app depends on lib/ (outside this folder),
# so the shared preprocessor/mtl tools are told to mount REPO via WORKDIR. The
# preprocess→compile plumbing is duplicated across the app leaves for now (#63) —
# a shared src/apps helper is the DRY follow-up (#187).
version: '3'

# Source/output paths are hardcoded per task (not leaf-global vars): a leaf-global
# bleeds across the sibling apps:* includes, the same hazard boot/bootV2 call out.
# app-template builds apps/template/main.mtl → build/app-template.
vars:
  OUT: '{{.OUT | default "build"}}'
  # REPO = the mtl layer root, resolved depth-independently (walk up to just below
  # .git). MUST be identical in every leaf: Task keeps one entry per leaf-global
  # var name, so a fixed-depth formula from a sibling at another depth can be
  # applied here with the wrong root (random Go map order). See mtl/boot.
  REPO:
    sh: d='{{.TASKFILE_DIR}}'; while [ "$(dirname "$d")" != / ] && [ ! -e "$(dirname "$d")/.git" ]; do d="$(dirname "$d")"; done; echo "$d"

includes:
  preprocessor:
    taskfile: ../../tools/preprocessor/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-preprocessor, DIR: ../../tools/preprocessor}
  mtl:
    taskfile: ../../tools/mtl_linux/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-mtl, DIR: ../../tools/mtl_linux}

tasks:
  build:
    desc: 'Build app-template → build/app-template.'
    summary: 'Usage: task app-template:build [OUT=build]'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/app-template'
    cmds:
      - task: preprocessor:preprocess
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: 'apps/template/main.mtl'
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'apps/template lib/'
      - task: mtl:compile
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          OUT: '{{.APP_OUT}}'

  simulate:
    desc: 'Simulate app-template in the MTL simulator. HTTP UI at http://localhost:8080.'
    summary: 'Usage: task app-template:simulate [OUT=build] [PORT=8080]'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/app-template'
    cmds:
      - task: preprocessor:preprocess
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: 'apps/template/main.mtl'
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'apps/template lib/'
          DEFINES: SIMU
      - task: mtl:simulate
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          PORT: '{{.PORT}}'
          CLI_ARGS: '{{.CLI_ARGS}}'
