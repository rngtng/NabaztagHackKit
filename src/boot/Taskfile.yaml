# boot — self-contained build/simulate for the boot MTL image (#63).
#
# Root only `includes:` this under the `boot` namespace → `boot:build` /
# `boot:simulate`. Relocatable (repo root AND `cd src/boot && task build`);
# REPO = repo root, passed as WORKDIR so the shared preprocessor/mtl tools mount
# it. The build emits raw bytecode (SIGN=false) plus the dumpbc.c debug dump that
# `firmware:build` compiles into the C VM (bootstrap order in CLAUDE.md).
version: '3'

# SOURCE is hardcoded per task (not a var): a `{{.SOURCE | default}}` leaf-global
# reads an ambient SOURCE, which bleeds across sibling leaves (bootV2 clobbered
# boot). Boot always builds src/boot/boot.mtl.
vars:
  OUT: '{{.OUT | default "build"}}'
  REPO:
    sh: cd '{{.TASKFILE_DIR}}/../..' && pwd

includes:
  preprocessor:
    taskfile: ../../tools/preprocessor/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-preprocessor, DIR: ../../tools/preprocessor}
  mtl:
    taskfile: ../../tools/mtl_linux/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-mtl, DIR: ../../tools/mtl_linux}

tasks:
  build:
    desc: 'Build boot bytecode → build/boot (raw, unsigned). Emits dumpbc.c for firmware:build.'
    summary: 'Usage: task boot:build [OUT=build]'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/boot'
    cmds:
      - task: preprocessor:preprocess
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: src/boot/boot.mtl
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: '. src/boot'
      - task: mtl:compile
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          OUT: '{{.APP_OUT}}'
          SIGN: 'false'

  simulate:
    desc: 'Simulate boot.mtl in config mode. Config UI served at http://localhost:8080.'
    summary: 'Usage: task boot:simulate [OUT=build] [PORT=8080]'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/boot_simu'
    cmds:
      - task: preprocessor:preprocess
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: src/boot/boot.mtl
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: '. src/boot'
          DEFINES: 'SIMU BOOT'
      - task: mtl:simulate
        vars:
          WORKDIR: '{{.REPO}}'
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          PORT: '{{.PORT}}'
          CLI_ARGS: '{{.CLI_ARGS}}'
