# app-sse â€” self-contained build/simulate for the SSE server MTL app (#63).
#
# Root only `includes:` this under the `app-sse` namespace â†’ `app-sse:build` /
# `app-sse:simulate`. Preprocessâ†’compile plumbing is duplicated across app
# leaves for now (#63); a shared src/apps helper is the DRY follow-up.
version: '3'

vars:
  TARGET: app-sse
  OUT: '{{.OUT | default "build"}}'

includes:
  preprocessor:
    taskfile: ../../tools/preprocessor/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-preprocessor, DIR: ../../tools/preprocessor}
  mtl:
    taskfile: ../../tools/mtl_linux/Taskfile.yaml
    internal: true
    vars: {IMAGE: nabaztag-sdk-mtl, DIR: ../../tools/mtl_linux}

tasks:
  build:
    desc: 'Build the SSE server app â†’ build/app-sse.'
    summary: 'Usage: task app-sse:build [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/{{.TARGET}}'
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: 'src/{{.TARGET}}/main.mtl'
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'src/{{.TARGET}} lib/'
      - task: mtl:compile
        vars:
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          OUT: '{{.APP_OUT}}'

  simulate:
    desc: 'Simulate the SSE server app in the MTL simulator. HTTP UI at http://localhost:8080.'
    summary: 'Usage: task app-sse:simulate [OUT=build] [PORT=8080]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/{{.TARGET}}'
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: 'src/{{.TARGET}}/main.mtl'
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'src/{{.TARGET}} lib/'
          DEFINES: SIMU
      - task: mtl:simulate
        vars:
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          PORT: '{{.PORT}}'
          CLI_ARGS: '{{.CLI_ARGS}}'
