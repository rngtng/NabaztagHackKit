# NabaztagSDK — unified entrypoint.
#
# Every build runs inside Docker, so the only host requirements are Docker and
# Task (https://taskfile.dev). Each tool/layer folder is self-contained (it owns
# its Dockerfile + Taskfile); this root file just includes them under a per-layer
# namespace. Run `task` with no args to list everything.
version: '3'

vars:
  OUT: build

includes:
  preprocessor: # MTL preprocessor — expand #include / #ifdef (tools/preprocessor)
    internal: true
    taskfile: ./tools/preprocessor/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-preprocessor
      DIR: ./tools/preprocessor/

  mtl: # MTL toolchain — compile + simulate (tools/mtl_linux)
    internal: true
    taskfile: ./tools/mtl_linux/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-mtl
      DIR: ./tools/mtl_linux/

  firmware: # NabGCC based firmware
    internal: true
    taskfile: ./src/firmware/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-firmware
      DIR: ./src/firmware/

  mkfirmware: # Sign a firmware .bin → .sim for web upload (tools/mkfirmware)
    internal: true
    taskfile: ./tools/mkfirmware/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-mkfirmware
      DIR: ./tools/mkfirmware/

  firmwareV2: # eLua-successor V2 firmware bring-up (Lua 5.4) — ARM7TDMI/ML67Q4051 (#87)
    internal: true
    taskfile: ./src/firmwareV2/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-firmwarev2
      DIR: ./src/firmwareV2/

  testvm: # Native C VM smoke-test harness, built from the firmware's own vm/net sources (tools/testvm)
    internal: true
    taskfile: ./tools/testvm/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-testvm
      DIR: ./tools/testvm/

  mockserver: # Mock HTTP file server for end-to-end simulation (tools/mockserver)
    internal: true
    taskfile: ./tools/mockserver/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-mockserver
      DIR: ./tools/mockserver/

tasks:
  # ------------------------ Internal ----------------------------------
  build:target:
    desc: 'Build a target (app or boot).'
    summary: 'Usage: task build:target TARGET=app1|app2|boot [SOURCE=src/<target>/main.mtl] [INCLUDES="src/<target> lib/"] [SIGN=false] [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    internal: true
    vars:
      APP_OUT: '{{.OUT}}/{{.TARGET}}'
      SOURCE: '{{.SOURCE | default (printf "src/%s/main.mtl" .TARGET)}}'
      INCLUDES: '{{.INCLUDES | default (printf "src/%s lib/" .TARGET)}}'
    requires:
      vars: [TARGET]
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: '{{.SOURCE}}'
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: '{{.INCLUDES}}'
      - task: mtl:compile
        vars:
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          OUT: '{{.APP_OUT}}'
          SIGN: '{{.SIGN}}'

  simulate:app:mock:
    desc: 'Simulate an app end-to-end with the mock file server (issue #39). Serves src/<TARGET>/assets over HTTP and points the sim at it.'
    summary: 'Usage: task simulate:app:mock TARGET=app-piper'
    dir: '{{.USER_WORKING_DIR}}'
    internal: true
    requires:
      vars: [TARGET]
    vars:
      NET: nabaztag-mocknet
      MOCK_IP: 172.30.0.10
      ASSETS: 'src/{{.TARGET}}/assets'
    cmds:
      - task: mockserver:image
      # shared network + mock container the sim can reach at a fixed IP (literal IP => sim skips DNS)
      - docker network create --subnet 172.30.0.0/24 {{.NET}} >/dev/null 2>&1 || true
      - defer: docker network rm {{.NET}} >/dev/null 2>&1 || true
      - docker rm -f nabaztag-mock >/dev/null 2>&1 || true
      - 'docker run -d --rm --name nabaztag-mock --network {{.NET}} --ip {{.MOCK_IP}} -v "$(realpath {{.ASSETS}}):/assets:ro" nabaztag-sdk-mockserver >/dev/null'
      - defer: docker stop nabaztag-mock >/dev/null 2>&1 || true
      # stream the mock's request log alongside the sim output (-u: unbuffered, so lines appear live)
      - docker logs -f nabaztag-mock 2>&1 | sed -u 's/^/[mock] /' &
      - task: simulate:target
        vars:
          TARGET: '{{.TARGET}}'
          NETWORK: '{{.NET}}'
          CLI_ARGS: '--serverurl {{.MOCK_IP}} {{.CLI_ARGS}}'

  simulate:target:
    desc: 'Simulate a target (app or boot) in MTL simulator. HTTP UI at http://localhost:8080.'
    summary: 'Usage: task simulate:target TARGET=app1|app2|boot [SOURCE=src/<target>/main.mtl] [INCLUDES="src/<target> lib/"] [DEFINES=SIMU]'
    dir: '{{.USER_WORKING_DIR}}'
    internal: true
    vars:
      APP_OUT: '{{.OUT}}/{{.TARGET}}'
      SOURCE: '{{.SOURCE | default (printf "src/%s/main.mtl" .TARGET)}}'
      INCLUDES: '{{.INCLUDES | default (printf "src/%s lib/" .TARGET)}}'
      DEFINES: '{{.DEFINES | default "SIMU"}}'
    requires:
      vars: [TARGET]
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: '{{.SOURCE}}'
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: '{{.INCLUDES}}'
          DEFINES: '{{.DEFINES}}'
      - task: mtl:simulate
        vars:
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          NETWORK: '{{.NETWORK}}'       # empty unless simulate:app:mock joins a shared network
          CLI_ARGS: '{{.CLI_ARGS}}'     # forward -- extra args (e.g. --serverurl) to mtl_simu

   # ----------------------------------------------------------

  clean:
    desc: 'Clean all build artifacts (firmware, boot, etc.)'
    cmds:
      - task: mtl:clean
      - task: preprocessor:clean
      - task: firmware:clean
      - task: firmwareV2:clean
      - task: testvm:clean
      - rm -rf '{{.OUT}}'

  test:
    desc: 'Preprocess and run MTL unit tests.'
    summary: 'Usage: task test'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: "test/test.mtl"
      TEST_OUT: '{{.OUT}}/test'
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: '{{.SOURCE}}'
          OUT: '{{.TEST_OUT}}/merged.mtl'
      - task: mtl:test
        vars:
          SOURCE: '{{.TEST_OUT}}/merged.mtl'

  verify:
    desc: 'Definition of done: run before every commit. Tests + boot + app-piper + device template + app-sse + firmwareV2 all build.'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: test
      - task: build:boot
      - task: build:app:piper
      - task: build:app:template
      - task: build:app:sse
      - task: build:firmwareV2

  # ----------------------------------------------------------

  build:boot:
    desc: 'Build boot firmware. Preprocess files, then compile.'
    summary: 'Usage: task boot:build [SOURCE=src/boot/boot.mtl] [OUT=build/boot]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "src/boot/boot.mtl"}}'
    cmds:
      - task: build:target
        vars:
          TARGET: boot
          SOURCE: '{{.SOURCE}}'
          INCLUDES: '. {{dir .SOURCE}}'
          SIGN: 'false'

  simulate:boot:
    desc: 'Preprocess and simulate boot.mtl in config mode. Config UI served at http://localhost:8080.'
    summary: 'Usage: task boot:simulate [SOURCE=src/boot/boot.mtl] [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "src/boot/boot.mtl"}}'
    cmds:
      - task: simulate:target
        vars:
          TARGET: boot_simu
          SOURCE: '{{.SOURCE}}'
          INCLUDES: '. {{dir .SOURCE}}'
          DEFINES: 'SIMU BOOT'

  build:bootV2:
    desc: 'Build boot firmware V2. Preprocess files, then compile.'
    summary: 'Usage: task boot:buildV2 [SOURCE=src/bootV2/boot.mtl] [OUT=build/boot]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "src/bootV2/boot.mtl"}}'
    cmds:
      - task: build:target
        vars:
          TARGET: boot
          SOURCE: '{{.SOURCE}}'
          INCLUDES: '. {{dir .SOURCE}}'
          SIGN: 'false'

  simulate:bootV2:
    desc: 'Preprocess and simulate bootV2.mtl in config mode. Config UI served at http://localhost:8080.'
    summary: 'Usage: task bootV2:simulate [SOURCE=src/bootV2/boot.mtl] [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "src/bootV2/boot.mtl"}}'
    cmds:
      - task: simulate:target
        vars:
          TARGET: boot_simu
          SOURCE: '{{.SOURCE}}'
          INCLUDES: '. {{dir .SOURCE}}'
          DEFINES: 'SIMU BOOT'

  # ----------------------------------------------------------

  build:firmware:
    desc: 'Build firmware. Copy boot dumpbc.c, then compile.'
    summary: 'Usage: task firmware:build [SOURCE=build/boot/dumpbc.c] [OUT=build/firmware]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.OUT}}/boot/dumpbc.c'
      FIRMWARE_OUT: '{{.OUT}}/firmware'
    cmds:
      # firmware need latest dumpbc.c in sr/bc.c
      - cp '{{.SOURCE}}' src/firmware/src/bc.c
      - task: firmware:compile
      - rm -rf '{{.FIRMWARE_OUT}}'
      - mv src/firmware/bin '{{.FIRMWARE_OUT}}'
      - rm -rf src/firmware/obj src/firmware/src/bc.c

  disasm:firmware:
    desc: 'Disassemble a built firmware ELF with the toolchain objdump → stdout. Requires build:firmware first.'
    summary: 'Usage: task disasm:firmware [ELF=build/firmware/Nab.elf] > Nab.dis'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      ELF: '{{.ELF | default (printf "%s/firmware/Nab.elf" .OUT)}}'
    cmds:
      - task: firmware:dis
        vars:
          ELF: '{{printf "%s/%s" .USER_WORKING_DIR .ELF}}'

  test:firmware:
    desc: 'Smoke-test the firmware C VM (native build, not the MTL simulator) against boot bytecode. Requires build:boot first.'
    summary: 'Usage: task test:firmware [SOURCE=build/boot/dumpbc.c] [DURATION=5]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default (printf "%s/boot/dumpbc.c" .OUT)}}'
      DURATION: '{{.DURATION | default 5}}'
    cmds:
      - task: testvm:test
        vars:
          SOURCE: '{{.SOURCE}}'
          SOCK_DIR: '{{.OUT}}'
          DURATION: '{{.DURATION}}'

  test:firmware-bugs:
    desc: 'Reproduce the flagged firmware VM memory-safety bugs under AddressSanitizer.'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: testvm:bugs

  build:sim:
    desc: 'Build the full firmware and sign it for web upload → build/firmware/Nab.sim. Chains build:boot → build:firmware → sign → verify.'
    summary: 'Usage: task build:sim [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      FIRMWARE_OUT: '{{.OUT}}/firmware'
    cmds:
      - task: build:boot
      - task: build:firmware
      - task: mkfirmware:sign
        vars:
          SOURCE: '{{.FIRMWARE_OUT}}/Nab.bin'
          OUT: '{{.FIRMWARE_OUT}}/Nab.sim'
      - task: mkfirmware:verify
        vars:
          FILE: '{{.FIRMWARE_OUT}}/Nab.sim'
      - 'echo "[firmware] {{.FIRMWARE_OUT}}/Nab.sim ready — upload via the config page (blue LEDs)"'

  flash:firmware:
  #   - the recovery-path/boot flash, counterpart to flash: firmwareV2 (same ML67Q4051 chip + OpenOCD config). Host-side (not Docker). Chains build:boot → build:firmware, then flash.py.'
    summary: 'Usage: task flash:firmware [PI_HOST=tobi@jtag.local]. See tools/openocd/README.md.'
    desc: 'Flash the V1 boot firmware to real hardware over JTAG, via the Raspberry Pi bridge.'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      PI_HOST: '{{.PI_HOST | default "tobi@jtag.local"}}'
      FIRMWARE_OUT: '{{.OUT}}/firmware'
    cmds:
      - task: build:boot
      - task: build:firmware
      - python3 tools/openocd/flash.py --host {{.PI_HOST}} --configs tools/openocd --elf {{.FIRMWARE_OUT}}/Nab.elf

  # ----------------------------------------------------------

  build:firmwareV2:
    desc: 'Build a V2 firmware bring-up app (ARM7TDMI/ML67Q4051, issue #87).'
    summary: 'Usage: task build:firmwareV2 [APP=hello]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: firmwareV2:compile
        vars:
          APP: '{{.APP | default "hello"}}'

  simulate:firmwareV2:
    desc: 'Run a V2 firmware app in the Unicorn simulator.'
    summary: 'Usage: task simulate:firmwareV2 [APP=hello] [ARGS=-v]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: firmwareV2:simulate
        vars:
          APP: '{{.APP | default "hello"}}'
          ARGS: '{{.ARGS}}'

  flash:firmwareV2:
    desc: 'Flash a V2 app to real hardware over JTAG, via a Raspberry Pi bridge.'
    summary: 'Usage: task flash:firmwareV2 [APP=hello] [PI_HOST=tobi@jtag.local]. See tools/openocd/README.md.'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      APP: '{{.APP | default "hello"}}'
      PI_HOST: '{{.PI_HOST | default "tobi@jtag.local"}}'
    cmds:
      - task: build:firmwareV2
        vars:
          APP: '{{.APP}}'
      - python3 tools/openocd/flash.py --host {{.PI_HOST}} --configs tools/openocd --elf src/firmwareV2/bin/{{.APP}}.elf

  repl:firmwareV2:
    desc: 'M4 Lua REPL in the simulator (#92): pass SCRIPT=file.lua to run a script, or omit it for a live interactive prompt.'
    summary: 'Usage: task repl:firmwareV2 [SCRIPT=path/to.lua] [N=budget]'
    dir: '{{.USER_WORKING_DIR}}'
    interactive: true
    cmds:
      # Resolve SCRIPT to an absolute path here (cwd = where the user ran task) so
      # the leaf task's bind mount works regardless of its own dir; empty when
      # omitted, which the leaf treats as "run the interactive prompt".
      - task: firmwareV2:repl
        vars:
          SCRIPT:
            sh: '[ -n "{{.SCRIPT}}" ] && realpath "{{.SCRIPT}}" || true'
          N: '{{.N}}'

  repl:firmwareV2:hw:
    desc: 'Flash a V2 app to real hardware and capture its console over the JTAG semihosting bridge'
    # the one command to read print()/REPL output on the rabbit. Optional SCRIPT=file.lua feeds REPL input; omit for just the boot output.'
    summary: 'Usage: task repl:firmwareV2:hw [APP=lua] [SCRIPT=path.lua] [PI_HOST=tobi@jtag.local]. See tools/openocd/README.md.'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      APP: '{{.APP | default "lua"}}'
      PI_HOST: '{{.PI_HOST | default "tobi@jtag.local"}}'
    cmds:
      - task: build:firmwareV2
        vars:
          APP: '{{.APP}}'
      - python3 tools/openocd/flash.py --semihosting --host {{.PI_HOST}} --configs tools/openocd --elf src/firmwareV2/bin/{{.APP}}.elf {{if .SCRIPT}}--input {{.SCRIPT}}{{end}}

  # ----------------------------------------------------------

  build:app:template:
    desc: 'Build app-template via build:target.'
    summary: 'Usage: task build:app:template [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build:target
        vars:
          TARGET: app-template

  simulate:app:template:
    desc: 'Simulate app-template via simulate:target. HTTP UI at http://localhost:8080.'
    summary: 'Usage: task simulate:app:template [OUT=build] [PORT=8080]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:target
        vars:
          TARGET: app-template

  build:app:piper:
    desc: 'Build app-piper via build:target.'
    summary: 'Usage: task build:app:piper [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build:target
        vars:
          TARGET: app-piper

  simulate:app:piper:
    desc: 'Simulate app-piper via simulate:target. HTTP UI at http://localhost:8080.'
    summary: 'Usage: task simulate:app:piper [OUT=build] [PORT=8080]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:target
        vars:
          TARGET: app-piper

  simulate:app:piper:mock:
    desc: 'Simulate app-piper end-to-end with the mock file server (serves src/app-piper/assets, e.g. init.forth).'
    summary: 'Usage: task simulate:app:piper:mock'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:app:mock
        vars:
          TARGET: app-piper

  build:app:sse:
    desc: 'Build SSE server.'
    summary: 'Usage: task build:sse [OUT=build/sse]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build:target
        vars:
          TARGET: app-sse

  simulate:app:sse:
    desc: 'Simulate SSE server.'
    summary: 'Usage: task simulate:sse [OUT=build/sse]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:target
        vars:
          TARGET: app-sse

