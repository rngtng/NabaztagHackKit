# NabaztagSDK — unified entrypoint.
#
# Every build runs inside Docker, so the only host requirements are Docker and
# Task (https://taskfile.dev). Sources are split into two self-contained tracks
# — `mtl/` (the MTL/C V1 stack) and `lua/` (the Lua V2 firmware) — each owning
# its own Taskfile + leaf includes, so targets read as `<track>:<layer>:<verb>`
# — e.g. `task mtl:app-piper:build`, `task mtl:boot:simulate`,
# `task mtl:lib:test`, `task lua:firmware:flash`. Every leaf is relocatable:
# `task mtl:lib:test` here == `cd mtl/lib && task test` there. Run `task` with
# no args to list everything.
#
# Root owns no toolchain includes and re-implements nothing: `verify`/`clean`
# just chain the two tracks' own verbs. Decentralised per #63 — remaining
# per-leaf duplication is intentional for now (DRY: #187).
version: '3'

vars:
  OUT: build

includes:
  mtl: # MTL/C V1 stack: standard library, apps, boot, C VM firmware + toolchain
    taskfile: ./mtl/Taskfile.yaml
  lua: # Lua-successor V2 firmware (Lua 5.4)
    taskfile: ./lua/Taskfile.yaml

tasks:
  verify:
    desc: 'Definition of done: run before every commit. Builds/tests both layers (MTL V1 + Lua V2).'
    cmds:
      - task: mtl:verify
      - task: lua:verify

  verifyV2:
    desc: 'Definition of done for the Lua (V2) layer only.'
    cmds:
      - task: lua:verify

  clean:
    desc: 'Clean all build artifacts and the layers'' Docker images.'
    cmds:
      - task: mtl:clean
      - task: lua:clean
      - rm -rf '{{.OUT}}'
