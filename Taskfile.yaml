# NabaztagSDK — unified entrypoint.
#
# Every build runs inside Docker, so the only host requirements are Docker and
# Task (https://taskfile.dev). Each tool/layer folder is self-contained (it owns
# its Dockerfile + Taskfile); this root file just includes them under a per-layer
# namespace. Run `task` with no args to list everything.
version: '3'

vars:
  OUT: build

includes:
  preprocessor: # MTL preprocessor — expand #include / #ifdef (tools/preprocessor)
    internal: true
    taskfile: ./tools/preprocessor/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-preprocessor
      DIR: ./tools/preprocessor/

  mtl: # MTL toolchain — compile + simulate (tools/mtl_linux)
    internal: true
    taskfile: ./tools/mtl_linux/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-mtl
      DIR: ./tools/mtl_linux/

  firmware: # NabGCC based firmware
    internal: true
    taskfile: ./src/firmware/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-firmware
      DIR: ./src/firmware/

tasks:
  clean:
    desc: 'Clean all build artifacts (firmware, boot, etc.)'
    cmds:
      - task: mtl:clean
      - task: preprocessor:clean
      - task: firmware:clean
      - rm -rf '{{.OUT}}'

  build:boot:
    desc: 'Build boot firmware. Preprocess files, then compile. Usage: task boot:build [SOURCE=src/boot/boot.mtl] [OUT=build/boot]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "src/boot/boot.mtl"}}'
      BOOT_OUT: '{{.OUT}}/boot'
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: '{{.SOURCE}}'
          OUT: '{{.BOOT_OUT}}/merged.mtl'
          INCLUDES: '. {{dir .SOURCE}}'
      - task: mtl:compile
        vars:
          SOURCE: '{{.BOOT_OUT}}/merged.mtl'
          OUT: '{{.BOOT_OUT}}'
          SIGN: 'false'

  simulate:boot:
    desc: 'Preprocess and simulate boot.mtl in config mode. Config UI served at http://localhost:8080. Usage: task boot:simulate [SOURCE=src/boot/boot.mtl] [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "src/boot/boot.mtl"}}'
      SIMU_BOOT_OUT: '{{.OUT}}/boot_simu'
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: '{{.SOURCE}}'
          OUT: '{{.SIMU_BOOT_OUT}}/merged.mtl'
          INCLUDES: '. {{dir .SOURCE}}'
          DEFINES: 'SIMU BOOT'
      - task: mtl:simulate
        vars:
          SOURCE: '{{.SIMU_BOOT_OUT}}/merged.mtl'

  test:
    desc: 'Preprocess and run MTL unit tests. Usage: task test'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: "test/test.mtl"
      TEST_OUT: '{{.OUT}}/test'
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: '{{.SOURCE}}'
          OUT: '{{.TEST_OUT}}/merged.mtl'
      - task: mtl:test
        vars:
          SOURCE: '{{.TEST_OUT}}/merged.mtl'

  build:firmware:
    desc: 'Build firmware. Copy boot dumpbc.c, then compile. Usage: task firmware:build [SOURCE=build/boot/dumpbc.c] [OUT=build/firmware]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.OUT}}/boot/dumpbc.c'
      FIRMWARE_OUT: '{{.OUT}}/firmware'
    cmds:
      # firmware need latest dumpbc.c in sr/bc.c
      - cp '{{.SOURCE}}' src/firmware/src/bc.c
      - task: firmware:compile
      - rm -rf '{{.FIRMWARE_OUT}}'
      - mv src/firmware/bin '{{.FIRMWARE_OUT}}'
      - rm -rf src/firmware/obj src/firmware/src/bc.c

  # ----------------------------------------------------------
  build:app:
    desc: 'Build app Usage: task build:app TARGET=app1|app2 [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/{{.TARGET}}'
    requires:
      vars: [TARGET]
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: src/{{.TARGET}}/main.mtl
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'src/{{.TARGET}} lib/'
      - task: mtl:compile
        vars:
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          OUT: '{{.APP_OUT}}'

  simulate:app:
    desc: 'Simulate app MVP in MTL simulator. HTTP UI at http://localhost:8080. Usage: task simulate:app TARGET=app1|app2'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/{{.TARGET}}'
    requires:
      vars: [TARGET]
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: src/{{.TARGET}}/main.mtl
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'src/{{.TARGET}} lib/'
          DEFINES: 'SIMU'
      - task: mtl:simulate
        vars:
          SOURCE: '{{.APP_OUT}}/merged.mtl'

  build:app:template:
    desc: 'Build app-template via build:app. Usage: task build:app:template [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build:app
        vars:
          TARGET: app-template

  simulate:app:template:
    desc: 'Simulate app-template via simulate:app. HTTP UI at http://localhost:8080. Usage: task simulate:app:template [OUT=build] [PORT=8080]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:app
        vars:
          TARGET: app-template

  build:app:piper:
    desc: 'Build app-piper via build:app. Usage: task build:app:piper [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build:app
        vars:
          TARGET: app-piper

  simulate:app:piper:
    desc: 'Simulate app-piper via simulate:app. HTTP UI at http://localhost:8080. Usage: task simulate:app:piper [OUT=build] [PORT=8080]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:app
        vars:
          TARGET: app-piper

  build:app:sse:
    desc: 'Build SSE server. Usage: task build:sse [OUT=build/sse]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build:app
        vars:
          TARGET: app-sse

  simulate:app:sse:
    desc: 'Simulate SSE server. Usage: task simulate:sse [OUT=build/sse]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:app
        vars:
          TARGET: app-sse

