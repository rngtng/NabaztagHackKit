# NabaztagSDK — unified entrypoint.
#
# Every build runs inside Docker, so the only host requirements are Docker and
# Task (https://taskfile.dev). Each tool/layer folder is self-contained (it owns
# its Dockerfile + Taskfile); this root file just includes them under a per-layer
# namespace. Run `task` with no args to list everything.
version: '3'

vars:
  OUT: build

includes:
  preprocessor: # MTL preprocessor — expand #include / #ifdef (tools/preprocessor)
    internal: true
    taskfile: ./tools/preprocessor/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-preprocessor
      DIR: ./tools/preprocessor/

  mtl: # MTL toolchain — compile + simulate (tools/mtl_linux)
    internal: true
    taskfile: ./tools/mtl_linux/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-mtl
      DIR: ./tools/mtl_linux/

  firmware: # NabGCC based firmware
    internal: true
    taskfile: ./src/firmware/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-firmware
      DIR: ./src/firmware/

  mkfirmware: # Sign a firmware .bin → .sim for web upload (tools/mkfirmware)
    internal: true
    taskfile: ./tools/mkfirmware/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-mkfirmware
      DIR: ./tools/mkfirmware/

  firmwareV2: # eLua-successor V2 firmware bring-up (Lua 5.4) — ARM7TDMI/ML67Q4051 (#87)
    internal: true
    taskfile: ./src/firmwareV2/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-firmwarev2
      DIR: ./src/firmwareV2/

  testvm: # Native C VM smoke-test harness, built from the firmware's own vm/net sources (tools/testvm)
    internal: true
    taskfile: ./tools/testvm/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-testvm
      DIR: ./tools/testvm/

  mockserver: # Mock HTTP file server for end-to-end simulation (tools/mockserver)
    internal: true
    taskfile: ./tools/mockserver/Taskfile.yaml
    vars:
      IMAGE: nabaztag-sdk-mockserver
      DIR: ./tools/mockserver/

tasks:
  clean:
    desc: 'Clean all build artifacts (firmware, boot, etc.)'
    cmds:
      - task: mtl:clean
      - task: preprocessor:clean
      - task: firmware:clean
      - task: firmwareV2:clean
      - task: testvm:clean
      - rm -rf '{{.OUT}}'

  build:boot:
    desc: 'Build boot firmware. Preprocess files, then compile. Usage: task boot:build [SOURCE=src/boot/boot.mtl] [OUT=build/boot]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "src/boot/boot.mtl"}}'
      BOOT_OUT: '{{.OUT}}/boot'
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: '{{.SOURCE}}'
          OUT: '{{.BOOT_OUT}}/merged.mtl'
          INCLUDES: '. {{dir .SOURCE}}'
      - task: mtl:compile
        vars:
          SOURCE: '{{.BOOT_OUT}}/merged.mtl'
          OUT: '{{.BOOT_OUT}}'
          SIGN: 'false'

  simulate:boot:
    desc: 'Preprocess and simulate boot.mtl in config mode. Config UI served at http://localhost:8080. Usage: task boot:simulate [SOURCE=src/boot/boot.mtl] [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default "src/boot/boot.mtl"}}'
      SIMU_BOOT_OUT: '{{.OUT}}/boot_simu'
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: '{{.SOURCE}}'
          OUT: '{{.SIMU_BOOT_OUT}}/merged.mtl'
          INCLUDES: '. {{dir .SOURCE}}'
          DEFINES: 'SIMU BOOT'
      - task: mtl:simulate
        vars:
          SOURCE: '{{.SIMU_BOOT_OUT}}/merged.mtl'

  test:
    desc: 'Preprocess and run MTL unit tests. Usage: task test'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: "test/test.mtl"
      TEST_OUT: '{{.OUT}}/test'
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: '{{.SOURCE}}'
          OUT: '{{.TEST_OUT}}/merged.mtl'
      - task: mtl:test
        vars:
          SOURCE: '{{.TEST_OUT}}/merged.mtl'

  verify:
    desc: 'Definition of done: run before every commit. Tests + boot + app-piper + device template + app-sse + firmwareV2 all build.'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: test
      - task: build:boot
      - task: build:app:piper
      - task: build:app:template
      - task: build:app:sse
      - task: build:firmwareV2

  build:firmwareV2:
    desc: 'Build a V2 firmware bring-up app (ARM7TDMI/ML67Q4051, issue #87). Usage: task build:firmwareV2 [APP=hello]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: firmwareV2:compile
        vars:
          APP: '{{.APP | default "hello"}}'

  simulate:firmwareV2:
    desc: 'Run a V2 firmware app in the Unicorn simulator, no hardware (#96). Usage: task simulate:firmwareV2 [APP=hello] [ARGS=-v]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: firmwareV2:simulate
        vars:
          APP: '{{.APP | default "hello"}}'
          ARGS: '{{.ARGS}}'

  build:firmware:
    desc: 'Build firmware. Copy boot dumpbc.c, then compile. Usage: task firmware:build [SOURCE=build/boot/dumpbc.c] [OUT=build/firmware]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.OUT}}/boot/dumpbc.c'
      FIRMWARE_OUT: '{{.OUT}}/firmware'
    cmds:
      # firmware need latest dumpbc.c in sr/bc.c
      - cp '{{.SOURCE}}' src/firmware/src/bc.c
      - task: firmware:compile
      - rm -rf '{{.FIRMWARE_OUT}}'
      - mv src/firmware/bin '{{.FIRMWARE_OUT}}'
      - rm -rf src/firmware/obj src/firmware/src/bc.c

  build:sim:
    desc: 'Build the full firmware and sign it for web upload → build/firmware/Nab.sim. Chains build:boot → build:firmware → sign → verify. Usage: task build:sim [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      FIRMWARE_OUT: '{{.OUT}}/firmware'
    cmds:
      - task: build:boot
      - task: build:firmware
      - task: mkfirmware:sign
        vars:
          SOURCE: '{{.FIRMWARE_OUT}}/Nab.bin'
          OUT: '{{.FIRMWARE_OUT}}/Nab.sim'
      - task: mkfirmware:verify
        vars:
          FILE: '{{.FIRMWARE_OUT}}/Nab.sim'
      - 'echo "[firmware] {{.FIRMWARE_OUT}}/Nab.sim ready — upload via the config page (blue LEDs)"'

  test:firmware:
    desc: 'Smoke-test the firmware C VM (native build, not the MTL simulator) against boot bytecode. Requires build:boot first. Usage: task test:firmware [SOURCE=build/boot/dumpbc.c] [DURATION=5]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      SOURCE: '{{.SOURCE | default (printf "%s/boot/dumpbc.c" .OUT)}}'
      DURATION: '{{.DURATION | default 5}}'
    cmds:
      - task: testvm:test
        vars:
          SOURCE: '{{.SOURCE}}'
          SOCK_DIR: '{{.OUT}}'
          DURATION: '{{.DURATION}}'

  test:firmware-bugs:
    desc: 'Reproduce the flagged firmware VM memory-safety bugs under AddressSanitizer (issue #66). Fails while any bug is still present; passes once fixed.'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: testvm:bugs

  # ----------------------------------------------------------
  build:app:
    desc: 'Build app Usage: task build:app TARGET=app1|app2 [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/{{.TARGET}}'
    requires:
      vars: [TARGET]
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: src/{{.TARGET}}/main.mtl
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'src/{{.TARGET}} lib/'
      - task: mtl:compile
        vars:
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          OUT: '{{.APP_OUT}}'

  simulate:app:
    desc: 'Simulate app MVP in MTL simulator. HTTP UI at http://localhost:8080. Usage: task simulate:app TARGET=app1|app2'
    dir: '{{.USER_WORKING_DIR}}'
    vars:
      APP_OUT: '{{.OUT}}/{{.TARGET}}'
    requires:
      vars: [TARGET]
    cmds:
      - task: preprocessor:preprocess
        vars:
          SOURCE: src/{{.TARGET}}/main.mtl
          OUT: '{{.APP_OUT}}/merged.mtl'
          INCLUDES: 'src/{{.TARGET}} lib/'
          DEFINES: 'SIMU'
      - task: mtl:simulate
        vars:
          SOURCE: '{{.APP_OUT}}/merged.mtl'
          NETWORK: '{{.NETWORK}}'       # empty unless simulate:app:mock joins a shared network
          CLI_ARGS: '{{.CLI_ARGS}}'     # forward -- extra args (e.g. --serverurl) to mtl_simu

  simulate:app:mock:
    desc: 'Simulate an app end-to-end with the mock file server (issue #39). Serves src/<TARGET>/assets over HTTP and points the sim at it. Usage: task simulate:app:mock TARGET=app-piper'
    dir: '{{.USER_WORKING_DIR}}'
    requires:
      vars: [TARGET]
    vars:
      NET: nabaztag-mocknet
      MOCK_IP: 172.30.0.10
      ASSETS: 'src/{{.TARGET}}/assets'
    cmds:
      - task: mockserver:image
      # shared network + mock container the sim can reach at a fixed IP (literal IP => sim skips DNS)
      - docker network create --subnet 172.30.0.0/24 {{.NET}} >/dev/null 2>&1 || true
      - defer: docker network rm {{.NET}} >/dev/null 2>&1 || true
      - docker rm -f nabaztag-mock >/dev/null 2>&1 || true
      - 'docker run -d --rm --name nabaztag-mock --network {{.NET}} --ip {{.MOCK_IP}} -v "$(realpath {{.ASSETS}}):/assets:ro" nabaztag-sdk-mockserver >/dev/null'
      - defer: docker stop nabaztag-mock >/dev/null 2>&1 || true
      # stream the mock's request log alongside the sim output (-u: unbuffered, so lines appear live)
      - docker logs -f nabaztag-mock 2>&1 | sed -u 's/^/[mock] /' &
      - task: simulate:app
        vars:
          TARGET: '{{.TARGET}}'
          NETWORK: '{{.NET}}'
          CLI_ARGS: '--serverurl {{.MOCK_IP}} {{.CLI_ARGS}}'

  build:app:template:
    desc: 'Build app-template via build:app. Usage: task build:app:template [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build:app
        vars:
          TARGET: app-template

  simulate:app:template:
    desc: 'Simulate app-template via simulate:app. HTTP UI at http://localhost:8080. Usage: task simulate:app:template [OUT=build] [PORT=8080]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:app
        vars:
          TARGET: app-template

  build:app:piper:
    desc: 'Build app-piper via build:app. Usage: task build:app:piper [OUT=build]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build:app
        vars:
          TARGET: app-piper

  simulate:app:piper:
    desc: 'Simulate app-piper via simulate:app. HTTP UI at http://localhost:8080. Usage: task simulate:app:piper [OUT=build] [PORT=8080]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:app
        vars:
          TARGET: app-piper

  simulate:app:piper:mock:
    desc: 'Simulate app-piper end-to-end with the mock file server (serves src/app-piper/assets, e.g. init.forth). Usage: task simulate:app:piper:mock'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:app:mock
        vars:
          TARGET: app-piper

  build:app:sse:
    desc: 'Build SSE server. Usage: task build:sse [OUT=build/sse]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: build:app
        vars:
          TARGET: app-sse

  simulate:app:sse:
    desc: 'Simulate SSE server. Usage: task simulate:sse [OUT=build/sse]'
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - task: simulate:app
        vars:
          TARGET: app-sse

