# NabaztagSDK — unified entrypoint.
#
# Every build runs inside Docker, so the only host requirements are Docker and
# Task (https://taskfile.dev). Each layer is self-contained: it owns its Taskfile
# with the layer's verbs (build / simulate / flash / …) and pulls in whatever
# tools it needs. This root file only `includes:` those leaves under a per-layer
# namespace, so targets read as `<layer>:<verb>` — e.g. `task firmwareV2:flash`,
# `task app-piper:build`, `task boot:simulate`, `task lib:test`. Every leaf is
# relocatable: `task <layer>:<verb>` here == `cd <layer> && task <verb>` there.
# Run `task` with no args to list everything.
#
# Root owns no toolchain includes and re-implements nothing: `test` delegates to
# `lib:test`; `verify`/`clean` just chain the layers' own verbs. Decentralised
# per #63 — remaining per-leaf duplication is intentional for now (DRY: #187).
version: '3'

vars:
  OUT: build

includes:
  lib: # MTL standard library + its test harness (owns the preprocessor/mtl toolchain)
    taskfile: ./lib/Taskfile.yaml
  app-template: # MTL device-stack template app
    taskfile: ./src/app-template/Taskfile.yaml
  app-piper: # MTL piper app
    taskfile: ./src/app-piper/Taskfile.yaml
  app-sse: # MTL SSE server app
    taskfile: ./src/app-sse/Taskfile.yaml
  boot: # boot MTL image (WiFi provisioning + OTA)
    taskfile: ./src/boot/Taskfile.yaml
  bootV2: # V2 boot MTL image
    taskfile: ./src/bootV2/Taskfile.yaml
  firmware: # NabGCC-based C VM firmware
    taskfile: ./src/firmware/Taskfile.yaml
  firmwareV2: # Lua-successor V2 firmware (Lua 5.4)
    taskfile: ./src/firmwareV2/Taskfile.yaml

tasks:
  verify:
    desc: 'Definition of done: run before every commit. Tests + boot + app-piper + device template + app-sse + firmwareV1 all build.'
    cmds:
      - task: lib:test
      - task: boot:build
      - task: app-piper:build
      - task: app-template:build
      - task: app-sse:build
      - task: firmware:test:bugs
      - task: firmwareV2:build

  verifyV2:
    desc: 'Definition of done: run before every commit. Tests + boot + app-piper + device template + app-sse + firmwareV2 all build.'
    cmds:
      - task: firmwareV2:build

  clean:
    desc: 'Clean all build artifacts and the layers'' Docker images.'
    cmds:
      - task: lib:clean
      - task: firmware:clean
      - task: firmwareV2:clean
      - rm -rf '{{.OUT}}'
